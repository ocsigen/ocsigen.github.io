<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{{title}} — Ocsigen</title>
  <!-- og:image gives the post a thumbnail on social cards and on the OCaml
       Planet (its scraper reads og:image into a post's preview_image). -->
  <meta property="og:image" content="https://ocsigen.org/img/ocsigen-badge-400.png"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/ocsigen-odoc.css"/>
  <link rel="stylesheet" href="/css/wodoc.css"/>
  <!-- odoc emits code blocks as <pre class="language-..">; highlight them
       client-side with odoc's bundled highlight.js (loaded in <head>, as odoc
       does). wodoc-highlight.js teaches it the Ocsigen OCaml extensions
       (let%client/%server/%shared/%rpc, ~%injection, let* …) and starts it. -->
  <script src="/doc/highlight.pack.js"></script>
  <script src="/doc/wodoc-highlight.js"></script>
</head>
<body class="wodoc-page wodoc-doc wodoc-blog-page wodoc-project-blog">
  {{menu}}

  <div class="project-page">
    <div class="twocols">
      <nav class="leftcol">
        {{leftnav}}
      </nav>
      <article class="rightcol">
        {{preamble}}
        {{content}}
      </article>
    </div>
  </div>

  <footer class="main-page-section main-page-section-about wodoc-blog-footer">
    <div class="main-page-section-content">
      <p>Questions or feedback? Open a discussion on <a href="https://discuss.ocaml.org">Discuss.ocaml.org</a> or contact us at
        <a href="mailto:dev@ocsigen.org">dev@ocsigen.org</a>.</p>
    </div>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{{title}} — Ocsipersist</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/wodoc/ocsigen-odoc.css"/>
  <!-- odoc emits code blocks as <pre class="language-..">; highlight them
       client-side with odoc's bundled highlight.js (loaded in <head>, as odoc
       does). ocsipersist-highlight.js starts the highlighting. -->
  <script src="{{base}}/highlight.pack.js"></script>
  <script src="{{base}}/ocsipersist-highlight.js"></script>
</head>
<body class="wodoc-page wodoc-doc">
  {{menu}}

  <div class="project-page">
    <div class="twocols">
      <nav class="leftcol">
        {{leftnav}}
      </nav>
      <article class="rightcol">
        {{preamble}}
        {{content}}
      </article>
    </div>
  </div>

  <script>
    // Switch documentation version, staying on the same page when possible:
    // only the version segment of the current path is swapped.
    function wodocVersion(v) {
      if (!v) return;
      var re = new RegExp('^({{pub}}/)[^/]+');
      var p = location.pathname;
      location.href = re.test(p) ? p.replace(re, '$1' + v) : '{{pub}}/' + v + '/index.html';
    }
    // The current version comes from the URL, not the build: the same files are
    // served under <version>/ and the `latest` symlink, so mark the selected
    // option from the path. There are two selectors (left column + burger).
    (function () {
      var m = location.pathname.match(new RegExp('^{{pub}}/([^/]+)'));
      if (!m) return;
      document.querySelectorAll('.wodoc-version').forEach(function (sel) {
        var ok = false, i;
        for (i = 0; i < sel.options.length; i++)
          if (sel.options[i].value === m[1]) { sel.selectedIndex = i; ok = true; break; }
        if (!ok) {
          var o = document.createElement('option');
          o.value = m[1]; o.textContent = m[1]; o.selected = true;
          sel.insertBefore(o, sel.firstChild);
        }
      });
    })();
  </script>
</body>
</html>

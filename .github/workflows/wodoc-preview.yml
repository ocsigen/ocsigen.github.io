# Builds the wodoc preview of the site into /wodoc/ and commits the generated
# HTML back to the repo, so GitHub Pages serves it alongside the current site
# (e.g. ocsigen.org/projects vs ocsigen.org/wodoc/projects) for comparison.
#
# Prerequisites:
#   - the wodoc tool published at github.com/ocsigen/wodoc
#   - the wodoc/ directory (src/, template*.html, *.css, build.sh) committed here
name: wodoc preview

on:
  push:
    branches: [master]
    paths:
      - "wodoc/src/**"
      - "wodoc/template*.html"
      - "wodoc/*.css"
      - "wodoc/build.sh"
      - ".github/workflows/wodoc-preview.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"

      - name: Install wodoc and odoc
        run: |
          opam pin add -y --no-action wodoc git+https://github.com/ocsigen/wodoc.git
          opam install -y wodoc odoc

      - name: Build /wodoc/
        run: opam exec -- bash wodoc/build.sh

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wodoc/*.html
          if git diff --cached --quiet; then
            echo "No change in generated pages."
          else
            git commit -m "Rebuild wodoc preview [skip ci]"
            git push
          fi

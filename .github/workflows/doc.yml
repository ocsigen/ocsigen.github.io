# Build the vitrine (home + projects/install/credits/papers/contributing) from
# doc/vitrine/*.mld into the site root, on every push to master.
# Every project — including the archived ocsimore and html_of_wiki — publishes its
# own documentation to its OWN repo's gh-pages branch (a project page at
# ocsigen.org/<repo>/ takes precedence over a same-named dir here, so hosting them
# in this repo did not work). Their wodoc sources still live in doc/ocsimore and
# doc/html_of_wiki; rebuild + push to the respective gh-pages when they change.
# This workflow only covers the vitrine, which lives in THIS repo.
# GitHub Pages serves the repo (no Jekyll: a .nojekyll at the root makes it serve
# the files as-is), so the generated pages are committed back to master (with
# [skip ci] to avoid retriggering this workflow).
name: Documentation

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Serialise: this workflow commits the rebuilt vitrine back to master, so two runs
# must never run at once (a stale run could otherwise clobber a newer commit, as
# happened once when it re-added the archived docs).
concurrency:
  group: doc-deploy-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'ocsigen/ocsigen.github.io'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.0"

      # The bulk of this job (~3.5 min of a ~4 min run) is compiling wodoc + odoc
      # from source; the actual page build takes ~2 s. setup-ocaml only caches the
      # base switch (compiler), so they recompiled on every push. Cache the whole
      # switch keyed on wodoc's HEAD commit (resolved below) so a cache hit skips
      # the install entirely; when wodoc moves, the key changes and it rebuilds
      # once, then re-caches.
      - name: Resolve wodoc HEAD commit
        id: wodoc
        run: echo "sha=$(git ls-remote https://github.com/ocsigen/wodoc.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache the opam switch (wodoc + odoc)
        id: switch-cache
        uses: actions/cache@v4
        with:
          path: _opam
          key: opam-switch-${{ runner.os }}-ocaml5.4.0-wodoc-${{ steps.wodoc.outputs.sha }}

      - name: Install wodoc and odoc
        if: steps.switch-cache.outputs.cache-hit != 'true'
        run: |
          opam pin add -n wodoc https://github.com/ocsigen/wodoc.git
          opam install wodoc odoc

      - name: Build the blog
        run: |
          ( cd doc/blog && OUT="$PWD/../.." opam exec -- bash build.sh )

      - name: Build the vitrine
        run: |
          ( cd doc/vitrine && OUT="$PWD/../.." opam exec -- bash build.sh )

      - name: Commit the regenerated pages to master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A intro.html index.html projects.html install.html credits.html \
                     papers.html contributing.html blog feed.xml \
                     intro.md index.md projects.md install.md credits.md \
                     papers.md contributing.md llms.txt
          git diff --cached --quiet || git commit -m "Rebuild vitrine + blog [skip ci]"
          git push
